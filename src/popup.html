<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420">
  <title>Tab Memory Cleaner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 420px;
      max-height: 580px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
      overflow-y: auto;
    }

    /* ─── Header ─────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .logo { font-size: 20px; }
    .header .settings-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    .header .settings-btn:hover { background: rgba(255,255,255,0.25); }

    /* ─── System Bar ─────────────────────────────────── */
    .system-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: white;
      border-bottom: 1px solid #e8e8e8;
    }
    .memory-ring {
      width: 48px; height: 48px;
      position: relative;
    }
    .memory-ring svg { transform: rotate(-90deg); }
    .memory-ring .ring-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px; font-weight: 700;
      color: #333;
    }
    .system-stats { flex: 1; }
    .system-stats .stat-row {
      display: flex; justify-content: space-between;
      font-size: 12px; color: #666;
      padding: 1px 0;
    }
    .system-stats .stat-row .val { font-weight: 600; color: #333; }

    /* ─── Quick Actions ──────────────────────────────── */
    .actions {
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .action-btn {
      flex: 1;
      min-width: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .action-btn:hover { background: #f0f6ff; border-color: #1a73e8; }
    .action-btn:active { transform: scale(0.97); }
    .action-btn .icon { font-size: 20px; }
    .action-btn .label { font-size: 11px; font-weight: 600; color: #333; }
    .action-btn .shortcut { font-size: 9px; color: #999; }
    .action-btn.danger { border-color: #ffcdd2; }
    .action-btn.danger:hover { background: #fff5f5; border-color: #e53935; }

    /* ─── Tab List ────────────────────────────────────── */
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #999;
      padding: 8px 16px 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-title .total-mem { font-weight: 700; color: #1a73e8; }

    .tab-list { padding: 0 8px 8px; }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      cursor: default;
      transition: background 0.1s;
    }
    .tab-item:hover { background: #f5f5f5; }

    .tab-item .mem-bar {
      width: 48px; height: 20px;
      background: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    .tab-item .mem-bar .fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }
    .tab-item .mem-bar .mem-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 9px;
      font-weight: 700;
      color: #333;
      white-space: nowrap;
    }

    .tab-item .tab-info { flex: 1; min-width: 0; }
    .tab-item .tab-title {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #333;
    }
    .tab-item .tab-host {
      font-size: 10px;
      color: #999;
    }

    .tab-item .tab-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .tab-item:hover .tab-actions { opacity: 1; }

    .tab-item .tab-actions button {
      background: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 2px 6px;
      cursor: pointer;
      font-size: 11px;
      color: #666;
    }
    .tab-item .tab-actions button:hover {
      background: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }

    .tab-item.discarded { opacity: 0.4; }
    .tab-item.discarded .tab-title { font-style: italic; }

    .status-label {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .status-label.sleeping {
      background: #f0f0f0;
      color: #999;
    }

    .tab-item .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-active { background: #4caf50; }
    .dot-current { background: #1a73e8; }
    .dot-sleeping { background: #bdbdbd; }
    .dot-heavy { background: #f44336; }

    /* ─── Toast ───────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 12px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #323232;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      transition: transform 0.3s;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── Loading ─────────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 30px;
      color: #999;
    }
    .loading .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="logo">🧹</span>
      <h1>Tab Memory Cleaner</h1>
    </div>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
  </div>

  <div class="system-bar">
    <div class="memory-ring">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <circle cx="24" cy="24" r="20" fill="none" stroke="#e8e8e8" stroke-width="5"/>
        <circle cx="24" cy="24" r="20" fill="none" stroke="#1a73e8" stroke-width="5"
          stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-linecap="round" id="memRing"/>
      </svg>
      <span class="ring-text" id="memPercent">--%</span>
    </div>
    <div class="system-stats">
      <div class="stat-row">
        <span>System RAM</span>
        <span class="val" id="sysRam">--</span>
      </div>
      <div class="stat-row">
        <span>Chrome tabs</span>
        <span class="val" id="tabCount">--</span>
      </div>
      <div class="stat-row">
        <span>Tab memory</span>
        <span class="val" id="tabMem">--</span>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn" data-action="soft">
      <span class="icon">⚡</span>
      <span class="label">Soft</span>
      <span class="shortcut">Alt+1</span>
    </button>
    <button class="action-btn" data-action="deep">
      <span class="icon">🧹</span>
      <span class="label">Deep</span>
      <span class="shortcut">Alt+2</span>
    </button>
    <button class="action-btn danger" data-action="nuke">
      <span class="icon">💣</span>
      <span class="label">Nuke</span>
      <span class="shortcut">Alt+3</span>
    </button>
    <button class="action-btn" data-action="discard-others">
      <span class="icon">💤</span>
      <span class="label">Sleep All</span>
      <span class="shortcut">Alt+0</span>
    </button>
    <button class="action-btn" data-action="discard-by-memory">
      <span class="icon">📉</span>
      <span class="label">Kill Heavy</span>
      <span class="shortcut">>500MB</span>
    </button>
  </div>

  <div class="section-title">
    <span id="sectionTitle">Tabs by memory usage</span>
    <span class="total-mem" id="totalMem">--</span>
  </div>

  <div class="tab-list" id="tabList">
    <div class="loading">
      <div class="spinner"></div>
      <div style="margin-top:8px">Reading memory...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
